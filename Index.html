<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #121212; color: #00ff00; font-family: monospace; padding: 20px; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; }
        button { background: #333; color: #fff; border: none; padding: 10px; cursor: pointer; margin-top: 10px; }
        #output { margin-top: 20px; word-break: break-all; color: white; }
    </style>
</head>
<body>
    <h2>Script Generator</h2>
    <textarea id="luaCode" placeholder="Paste your Lua script here..."></textarea>
    <button onclick="generate()">Generate Protected Link</button>
    <div id="output"></div>

    <script>
        function generate() {
            const raw = document.getElementById('luaCode').value;
            const encoded = btoa(raw); // Encodes your script
            // Replace 'your-site.com' with your actual hosting URL
            const url = window.location.origin + window.location.pathname + "?key=" + encoded;
            document.getElementById('output').innerHTML = `<h3>Copy this link:</h3><p>${url}</p><h3>Roblox Loadstring:</h3><p>loadstring(game:HttpGet("${url}"))()</p>`;
        }

        // --- THE GATEKEEPER LOGIC ---
        const params = new URLSearchParams(window.location.search);
        const key = params.get("key");

        if (key) {
            // If someone uses the link in Roblox, they get the decoded script
            document.body.innerText = atob(key);
        } else if (window.location.search !== "") {
            // If the link is accessed but broken
            document.body.innerText = "ACCESS BLOCKED";
        }
    </script>
</body>
</html>
